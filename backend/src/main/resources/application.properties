spring.application.name=backend

# ==========================================
# Database Connection Settings
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/tabsense
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / Hibernate Configurations
# ==========================================
# Automatically update the database schema based on entities.
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries generated by Hibernate in the console log.
spring.jpa.show-sql=true

# Pretty-print the SQL console log format.
spring.jpa.properties.hibernate.format_sql=true

# Database dialect to map Hibernate types to PostgreSQL specific types.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
